name: E2E

on:
  pull_request:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

jobs:
  runtime:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build and run Docker E2E
        env:
          PYBETTERLEAKS_DOCKER_GHA_CACHE: "1"
          PYBETTERLEAKS_DOCKER_CACHE_SCOPE: pybetterleaks-e2e-slim
        run: bash e2e/run.sh
