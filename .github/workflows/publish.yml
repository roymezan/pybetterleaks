name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  wheels:
    uses: ./.github/workflows/wheels.yml

  publish:
    needs: wheels
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Inspect wheel artifacts
        run: python scripts/inspect_wheels.py dist --expected-version "${GITHUB_REF_NAME#v}"

      - name: Generate checksums
        run: python scripts/checksums.py dist --output ../release/SHA256SUMS

      - name: Verify checksums
        run: python scripts/checksums.py dist --verify ../release/SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.whl
            release/SHA256SUMS

      - uses: actions/upload-artifact@v7
        with:
          name: release-checksums
          path: release/SHA256SUMS

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Publish GitHub release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/SHA256SUMS \
              --verify-tag \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
          fi

      - name: Post-release audit
        run: python scripts/post_release_audit.py --version "${GITHUB_REF_NAME#v}" --retries 12 --retry-delay 10
