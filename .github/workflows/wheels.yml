name: Wheels

on:
  pull_request:
  push:
    branches:
      - "release/**"
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.cibw_archs }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            cibw_archs: x86_64
          - os: macos-15-intel
            cibw_archs: x86_64
          - os: macos-14
            cibw_archs: arm64
          - os: windows-2022
            cibw_archs: AMD64

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v6
        if: runner.os != 'Linux'
        with:
          go-version: "1.26.5"
          cache-dependency-path: bridge/go.sum

      - uses: actions/cache@v6
        if: runner.os == 'Linux'
        with:
          path: .cache/go-dist
          key: go-dist-${{ runner.os }}-${{ matrix.cibw_archs }}-go1.26.5

      - name: Install Python build tools
        run: uv sync --all-extras --dev

      - name: Build wheels
        run: uv run cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-* cp314-* cp315-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ENABLE: "cpython-prerelease"
          CIBW_ARCHS: "${{ matrix.cibw_archs }}"
          CIBW_BEFORE_ALL_LINUX: >
            bash scripts/install_go_linux_ci.sh
          CIBW_ENVIRONMENT_LINUX: >
            PATH="/usr/local/go/bin:$PATH"
          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=11.0
          CIBW_BEFORE_BUILD: >
            python scripts/build_native.py
          CIBW_TEST_COMMAND: >
            python {project}/scripts/wheel_smoke.py

      - name: Inspect wheel artifacts
        run: uv run python scripts/inspect_wheels.py wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_archs }}
          path: wheelhouse/*.whl
