site_name: PyBetterleaks
site_description: Python-native Betterleaks bindings with bundled platform wheels.
site_author: Roy Mezan
site_url: https://roymezan.github.io/pybetterleaks/
repo_name: roymezan/pybetterleaks
repo_url: https://github.com/roymezan/pybetterleaks
edit_uri: blob/main/docs/

exclude_docs: |
  abi.md
  ai-handoff.md
  architecture.md
  backlog.md
  docs-map.md
  implementation-notes.md
  project-brief.md
  release-checklist.md
  roadmap.md
  v0.2-plan.md
  v0.3-plan.md
  v0.4-plan.md
  v0.5-plan.md
  v0.6-plan.md
  v1-readiness.md
  workplan.md

theme:
  name: material
  language: en
  features:
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Git Scanning: git-scanning.md
  - API Reference: api.md
  - Benchmarks: benchmarks.md
  - Troubleshooting: troubleshooting.md
  - Project Trust:
      - Betterleaks Pin: betterleaks-pin.md
      - Supply Chain: supply-chain.md
      - Deprecation Policy: deprecation-policy.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - python
          options:
            docstring_style: google
            heading_level: 2
            inherited_members: true
            merge_init_into_class: true
            separate_signature: true
            show_root_heading: true
            show_source: false
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
